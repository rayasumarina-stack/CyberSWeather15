    /* ===== TEMP ===== */

    /* ===== GLOW LINE ===== */

    .hour-line{

        width:10px;

        border-radius:30px;

        background:
        linear-gradient(
        to top,
        #ff00ea,
        #00fff7
        );

        box-shadow:
        0 0 20px rgba(0,255,247,0.5);

        position:relative;

        transition:0.4s;

    }

    /* ===== DOT ===== */

    .hour-line::before{

        content:'';

        position:absolute;

        top:-8px;
        left:50%;

        transform:translateX(-50%);

        width:22px;
        height:22px;

        border-radius:50%;

        background:#00fff7;

        box-shadow:
        0 0 20px #00fff7,

        #ff00ea
        );

        font-weight:bold;

        cursor:pointer;

        box-shadow:
        0 0 15px rgba(0,255,247,0.5);

    /* ===== FLOAT ===== */

    @keyframes floatIcon{

            transform:translateY(0px);

        50%{
            transform:translateY(-6px);
        }

        100%{
            transform:translateY(0px);
        }

    }
    @media(max-width:768px){

        body{

            padding:0;

            margin:0;

            overflow:auto;

            align-items:flex-start;

        .card{

        }

        .day p{

        }

        .music-btn{

            width:100%;

            height:70px;

            font-size:24px;

            border-radius:20px;
        }

    }

    </style>
    </head>
    <body>
    <!-- ===== PREMIUM FEATURES PANEL ===== -->


    <!-- ===== Rain Effect ===== -->
    <div class="rain" id="rain"></div>

    <!-- ===== Weather Card ===== -->

    <div class="card">
    
        <div class="forecast" id="forecast"></div>
        <!-- ===== HOURLY FORECAST ===== -->

    <div class="hourly-panel">

        <h3>⏳ ПОГОДА ПО ЧАСАМ</h3>

        <div class="hourly-chart" id="hourlyChart">

        </div>

    </div>
        <div class="title">CYBER WEATHER</div>
        <button class="music-btn" onclick="toggleNight()">
            🌙 НОЧНОЙ РЕЖИМ
        </button>
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Введите город">
            <button onclick="searchWeather()">ПОИСК</button>
            <button onclick="getLocation()">📍 Геолокация</button>
        </div>
        
        <div class="city" id="city">Бишкек</div>

        <div class="temp" id="temp">22°C</div>

        <div class="weather" id="weather">Дождливая ночь</div>

        <div class="details">
            
            <div class="detail-box">
                <h4>ВЛАЖНОСТЬ</h4>
                <p id="humidity">78%</p>
            </div>

            <div class="detail-box">
                <h4>ВЕТЕР</h4>
                <p id="wind">12 km/h</p>
            </div>
        </div>

    </div>

    <script>
    function getLocation(){

        if(navigator.geolocation){

            navigator.geolocation.getCurrentPosition(async position => {

                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                const apiKey = 'e25b1d3faddc06f6fb66ee03a5b2c212';

                const url =
                `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&units=metric&lang=ru&appid=${apiKey}`;

                const response = await fetch(url);

                const data = await response.json();

                const city = data.city.name;

                searchWeather(city);

            });

        } else {

            alert("Геолокация не поддерживается");

        }

    }
    function showProMessage(){

        document
        .getElementById('proPopup')
        .style.display = 'flex';

    }

    function closeProPopup(){

        document
        .getElementById('proPopup')
        .style.display = 'none';

    }
    const weatherTranslate = {
        rain: "🌧 Дождь",
        clear: "☀️ Ясно",
        clouds: "☁️ Облачно",
        snow: "❄️ Снег",
        thunderstorm: "⚡ Гроза",
        drizzle: "🌦 Морось"
    };
    function toggleNight(){

        document.body.classList.toggle("night-mode");

    }
    function showFeature(type){

        const preview =
        document.getElementById('featurePreview');

        const title =
        document.getElementById('featureTitle');

        const visual =
        document.getElementById('featureVisual');

        const text =
        document.getElementById('featureText');

        preview.style.display = 'flex';

        // ===== RADAR =====

        if(type === 'radar'){

            title.innerHTML =
            '🛰 Живая карта погоды';

            visual.innerHTML = `

            <div class="live-radar">

                <div class="radar-line"></div>

                <div class="radar-dot"></div>

            </div>

            `;

            text.innerHTML =
            'Интерактивная карта отслеживания дождя и штормов.';

        }

        // ===== STORM =====

    

        // ===== AMOLED =====

        if(type === 'theme'){

            title.innerHTML =
            '🌌 AMOLED темы';

            visual.innerHTML = `

            <div class="amoled-preview">

                <div class="theme theme1"></div>

                <div class="theme theme2"></div>

                <div class="theme theme3"></div>

            </div>

            `;

            text.innerHTML =
            'Эксклюзивные cyberpunk AMOLED интерфейсы.';

        }

        // ===== WIDGET =====

        if(type === 'widget'){

            title.innerHTML =
            '📱 Виджеты';

            visual.innerHTML = `

            <div class="widget-live">

                <span>22°C</span>

                <small>Cyber Widget</small>

            </div>

            `;

            text.innerHTML =
            'Живые home-screen weather widgets.';

        }

        // ===== AI CLOTHES =====

        if(type === 'ai'){

            title.innerHTML =
            '👕 AI советы одежды';

            visual.innerHTML = `

            <div class="clothes-preview">

                <div class="cloth">🧥</div>

            </div>

            `;

            text.innerHTML =
            'Автоматические советы одежды под погоду.';

        }

    }
    function closeFeature(){

        document
        .getElementById('featurePreview')
        .style.display = 'none';

    }
    function generateAdvice(temp, weather){

        let advice = "";

        if(temp <= 0){

            advice =
            "🧥 Очень холодно. Надень тёплую куртку и перчатки.";

        }

        else if(temp < 15){

            advice =
            "🧥 Прохладно. Лучше взять худи или куртку.";

        }

        else if(temp < 25){

            advice =
            "👕 Отличная погода для лёгкой одежды.";

        }

        else{

            advice =
            "☀️ Жарко. Пей больше воды.";

        }

        if(weather.includes("Дождь")){

            advice += " ☔ Возьми зонт.";

        }

        document.getElementById("aiAdvice").innerText =
        advice;

    }
    function createSnow(){

        for(let i=0;i<80;i++){

            const snow = document.createElement("div");

            snow.classList.add("snowflake");

            snow.innerHTML = "❄";

            snow.style.left = Math.random()*100+"vw";

            snow.style.fontSize =
            (10 + Math.random()*20)+"px";

            snow.style.animationDuration =
            (5 + Math.random()*10)+"s";

            document.body.appendChild(snow);

        }

    }
    function normalizeWeather(type){
        return type.toLowerCase();
    }
    /* ===== Rain Generator ===== */
    let music;
    let playing = false;

    window.onload = function() {
        music = document.getElementById('rainMusic');
    };
    function changeTheme(weather){

        const body = document.body;

        const img = new Image();

        let url = "";

        if(weather.toLowerCase().includes("rain")){
            url = "https://images.unsplash.com/photo-1500674425229-f692875b0ab7";
        }

        else if(weather.toLowerCase().includes("clear")){
            url = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee";
        }

        else if(weather.toLowerCase().includes("cloud")){
            url = "https://images.unsplash.com/photo-1527766833261-b09c3163a791";
        }

        else{
            url = "https://images.unsplash.com/photo-1519608487953-e999c86e7455";
        }

        img.src = url;

        img.onload = function(){

            body.style.background =
            `linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.85)), url('${url}')`;

            body.style.backgroundSize = "cover";
            body.style.backgroundPosition = "center";
        }
    }

    function toggleMusic(){

        if(!music){
            alert("Audio not loaded");
            return;
        }

        if(!playing){
            music.play();
            playing = true;
        } else {
            music.pause();
            playing = false;
        }
    }

    const rain = document.getElementById('rain');

    /* ===== Оптимизация для телефонов ===== */

    const isMobile = window.innerWidth < 768;

    /* меньше дождя на телефонах */
    const rainAmount = isMobile ? 30 : 120;

    for(let i = 0; i < rainAmount; i++){

        let drop = document.createElement('div');

        drop.classList.add('drop');

        drop.style.left =
        Math.random() * 100 + 'vw';

        /* медленнее = меньше лагов */
        drop.style.animationDuration =
        (1 + Math.random() * 1.5) + 's';

        /* меньше прозрачности */
        drop.style.opacity =
        0.2 + Math.random() * 0.4;

        /* короче капли */
        drop.style.height =
        (20 + Math.random() * 40) + 'px';

        rain.appendChild(drop);

    }

    /* ===== Weather Search ===== */

    async function searchWeather(cityName){

        const city =
        cityName || document.getElementById('cityInput').value;

        const apiKey = 'e25b1d3faddc06f6fb66ee03a5b2c212';

        const url =
        `https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&appid=${apiKey}`;

        try{

            const response = await fetch(url);
            const data = await response.json();

            if(data.cod != "200"){
                alert(data.message || 'API Error');
                return;
            }

            // CURRENT WEATHER (первый элемент)
            const current = data.list[0];
            const weatherType = normalizeWeather(current.weather[0].main);
            document.getElementById('city').innerText = data.city.name;
            document.getElementById('temp').innerText = Math.round(current.main.temp) + '°C';
            document.getElementById('weather').innerText = weatherTranslate[weatherType] || current.weather[0].main;
            document.getElementById('humidity').innerText = current.main.humidity + '%';
            document.getElementById('wind').innerText = current.wind.speed + ' km/h';

            // ===== 5 DAY FORECAST =====
            const forecastBox = document.getElementById('forecast');
            forecastBox.innerHTML = '';
            // ===== HOURLY WEATHER =====

    const hourlyChart =
    document.getElementById('hourlyChart');

    hourlyChart.innerHTML = "";

    // показываем ближайшие 8 прогнозов
    for(let i = 0; i < 8; i++){

        const item = data.list[i];

        const temp =
        Math.round(item.main.temp);

        const time =
        item.dt_txt.split(" ")[1].slice(0,5);

        // высота линии
        const height =
        temp * 4;

    const column =
        document.createElement('div');

        column.classList.add('hour-item');

        let icon = "☀️";

        if(item.weather[0].main.toLowerCase().includes("cloud")){
            icon = "☁️";
        }
        else if(item.weather[0].main.toLowerCase().includes("rain")){
            icon = "🌧";
        }
        else if(item.weather[0].main.toLowerCase().includes("snow")){
            icon = "❄️";
        }
        else if(item.weather[0].main.toLowerCase().includes("thunder")){
            icon = "⚡";
        }

        column.innerHTML = `

            <div class="hour-icon">
                ${icon}
            </div>

            <div class="hour-temp">
                ${temp}°
            </div>

            <div class="hour-line"
            style="height:${height}px">
            </div>

            <div class="hour-time">
                ${time}
            </div>

        `;

        hourlyChart.appendChild(column);

    }
            // берём каждые 8 записей = 24 часа
            for(let i = 0; i < 5; i++){

                const item = data.list[i * 8];

                const date = new Date(item.dt_txt);
                const day = date.toLocaleDateString('ru', { weekday: 'short' });

                const div = document.createElement('div');
                div.classList.add('day');

                div.innerHTML = `
                    <h5>${day}</h5>
                    <p>${Math.round(item.main.temp)}°C</p>
                    <p>${weatherTranslate[normalizeWeather(item.weather[0].main)] || item.weather[0].main}</p>
                `;

                forecastBox.appendChild(div);
            }
                
            // ===== CHANGE ANIMATION =====
            changeTheme(current.weather[0].main);
            // обновление карты
           

        }

        catch(error){
            console.log(error);
            alert('API Error');
        }
    }

    /* Auto Load */

    searchWeather('Bishkek');
    let currentLang = "ru";
    const langData = {

        ru:{
            search:"ПОИСК",
            location:"📍 Геолокация",
            night:"🌙 НОЧНОЙ РЕЖИМ",
            humidity:"ВЛАЖНОСТЬ",
            wind:"ВЕТЕР",
            hourly:"⏳ ПОГОДА ПО ЧАСАМ",
            placeholder:"Введите город"
        },

        en:{
            search:"SEARCH",
            location:"📍 Location",
            night:"🌙 NIGHT MODE",
            humidity:"HUMIDITY",
            wind:"WIND",
            hourly:"⏳ HOURLY WEATHER",
            placeholder:"Enter city"
        }

    };
    function toggleLanguage(){

        currentLang =
        currentLang === "ru"
        ? "en"
        : "ru";

        const lang = langData[currentLang];

        document.querySelector(".lang-btn").innerText =
        currentLang === "ru"
        ? "🌐 EN"
        : "🌐 RU";

        document.querySelector(".music-btn").innerText =
        lang.night;

        document.getElementById("cityInput").placeholder =
        lang.placeholder;

        const buttons =
        document.querySelectorAll(".search-box button");

        buttons[0].innerText =
        lang.search;

        buttons[1].innerText =
        lang.location;

        document.querySelectorAll(".detail-box h4")[0].innerText =
        lang.humidity;

        document.querySelectorAll(".detail-box h4")[1].innerText =
        lang.wind;

        document.querySelector(".hourly-panel h3").innerText =
        lang.hourly;

    }

</script>
